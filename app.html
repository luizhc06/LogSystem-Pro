  }
}
// ── v8.0: identifyMarketplace — FIXED PRIORITY ───────────────
// Only KNOWN marketplace names in idCadIntTran take priority
// Unknown seller/channel names (like "Carbon Fak") fall through to xPed
const KNOWN_MARKETPLACES_SET = new Set([
  "magalu","magazine","amazon","mercado","meli","shopee","b2w","americanas",
  "submarino","shoptime","casas bahia","via varejo","netshoes","zattini",
  "carrefour","extra","aliexpress","wish","shopify","vtex","tiktok shop"
]);
function identifyMarketplace(idCadIntTran, xPed) {
  const id  = (idCadIntTran || "").toLowerCase().trim();
  const ped = (xPed || "").trim();
  const pedU = ped.toUpperCase();

  // Step 1: Is idCadIntTran a KNOWN marketplace? (not a seller/company name)
  const idKnown = [...KNOWN_MARKETPLACES_SET].some(m => id.includes(m));

  if (idKnown) {
    if (id.includes("magalu") || id.includes("magazine"))  return "Magalu";
    if (id.includes("amazon"))                              return "Amazon";
    if (id.includes("mercado") || id.includes("meli"))      return "Mercado Livre";
    if (id.includes("shopee"))                              return "Shopee";
    if (id.includes("b2w") || id.includes("americanas") || id.includes("submarino")) return "B2W / Americanas";
    if (id.includes("shoptime"))                            return "Shoptime";
    if (id.includes("casas bahia"))                         return "Casas Bahia";
    if (id.includes("netshoes") || id.includes("zattini"))  return "Netshoes";
    if (id.includes("carrefour"))                           return "Carrefour";
    if (id.includes("extra"))                               return "Extra";
    if (id.includes("tiktok"))                              return "TikTok Shop";
  }

  // Step 2: xPed prefix rules (reliable for Amazon & Magalu)
  if (pedU.startsWith("LU-"))                              return "Magalu";
  if (/^70[1234]-/.test(ped))                              return "Amazon";
  if (/^MLB/.test(pedU))                                   return "Mercado Livre";
  if (pedU.startsWith("SP-"))                              return "Shopee";
  if (pedU.startsWith("ML-"))                              return "Mercado Livre";

  // Step 3: Unknown seller name in idCadIntTran → Outros (don't use it as plataforma)
  return "Outros";
}

function parseNFe(xml){
  try{
    if(!xml || typeof xml !== "string") return null;
    xml = xml.replace(/^\uFEFF/, "").trim();
    if(!xml) return null;

    const p=new DOMParser();
    const doc=p.parseFromString(xml,"application/xml");
    if(doc.querySelector("parsererror"))return null;

    // Helper: namespace-safe — funciona com xmlns default (NFe, CTe, nfeProc, etc.)
    const g=tag=>{
      let els=doc.getElementsByTagName(tag);
      if(els.length>0)return els[0].textContent.trim();
      els=doc.getElementsByTagNameNS("*",tag);
      if(els.length>0)return els[0].textContent.trim();
      return "";
    };
    const gAll=tag=>{
      let els=doc.getElementsByTagName(tag);
      if(els.length>0)return Array.from(els);
      return Array.from(doc.getElementsByTagNameNS("*",tag));
    };
    const gIn=(parent,tag)=>{
      if(!parent)return null;
      let els=parent.getElementsByTagName(tag);
      if(els.length>0)return els[0];
      els=parent.getElementsByTagNameNS("*",tag);
      return els.length>0?els[0]:null;
    };
    const gAllIn=(parent,tag)=>{
      if(!parent)return [];
      let els=parent.getElementsByTagName(tag);
      if(els.length>0)return Array.from(els);
      return Array.from(parent.getElementsByTagNameNS("*",tag));
    };

    // Raiz lógica: infNFe (autorizada ou não)
    const infNFe = gAll("infNFe")[0] || doc.documentElement;

    // ── Destinatário ──────────────────────────────────────────
    const destNode = gAllIn(infNFe, "dest")[0] || gAll("dest")[0] || null;
    const enderDest = destNode ? (gIn(destNode, "enderDest") || gAllIn(destNode, "enderDest")[0]) : (gAll("enderDest")[0] || null);
    const cidade = enderDest ? (gIn(enderDest,"xMun")?.textContent.trim()||"") : "";
    const destUF = enderDest ? (gIn(enderDest,"UF")?.textContent.trim()||"") : "";
    const uf = Object.keys(BR_STATES).includes(destUF) ? destUF : "";

    const cpfCnpjDest = destNode
      ? (gIn(destNode,"CPF")?.textContent.trim() || gIn(destNode,"CNPJ")?.textContent.trim() || "")
      : "";
    const cepDest = enderDest ? (gIn(enderDest,"CEP")?.textContent.trim()||"") : "";

    // ── Transportadora ────────────────────────────────────────
    const transpRootEl = gAllIn(infNFe, "transp")[0] || gAll("transp")[0] || null;
    const transp = transpRootEl ? (gIn(transpRootEl,"transporta") || gAllIn(transpRootEl,"transporta")[0]) : (gAll("transporta")[0]||null);
    const transpNome = transp ? (gIn(transp,"xNome")?.textContent.trim()||"") : "";
    // Smart transportadora matching with normalization table
    const TRANSP_NORM = {
      "correios": "Correios", "ect": "Correios", "empresa brasileira de correios": "Correios",
      "braspress": "Braspress",
      "jadlog": "Jadlog",
      "loggi": "Loggi",
      "sequoia": "Sequoia",
      "direct": "Direct",
      "j&t": "J&T Express", "jnt": "J&T Express",
      "azul cargo": "Azul Cargo",
      "sao miguel": "Sao Miguel",
      "total express": "Total Express",
      "magalu entregas": "Magalu Entregas", "magalu": "Magalu Entregas",
      "shopee express": "Shopee Express",
      "via varejo": "Via Varejo",
    };
    const transpLow = transpNome.toLowerCase();
    let transportadora = "";
    // v8.0: match longest key first to prevent short keys matching wrong carrier
    // e.g. "magalu" must not match before "magalu entregas"
    const transp_keys_sorted = Object.keys(TRANSP_NORM).sort((a,b)=>b.length-a.length);
    for(const key of transp_keys_sorted){
      if(transpLow.includes(key)){ transportadora = TRANSP_NORM[key]; break; }
    }
    // Fallback: user-configured list (longest match wins)
    if(!transportadora){
      const listHits = TRANSPORTADORAS.filter(t=>transpLow.includes(t.toLowerCase()));
      if(listHits.length){ listHits.sort((a,b)=>b.length-a.length); transportadora=listHits[0]; }
    }
    // Se nenhum match conhecido: não usar nome cru (pode ser "JET Transportes 04" etc.)
    // O usuário ajusta manualmente ou a lista de transportadoras é expandida
    if(!transportadora) transportadora = "Correios";
    // Auto-add ao cadastro apenas se veio de match explícito (TRANSP_NORM ou lista do usuário)
    // ou seja: não adicionar nomes crus não reconhecidos
    const matchedFromNorm = Object.values(TRANSP_NORM).includes(transportadora);
    const matchedFromList = TRANSPORTADORAS.includes(transportadora);
    if(matchedFromNorm && !matchedFromList){
      TRANSPORTADORAS.push(transportadora);
      saveLists();
    }

    // ── Número do Pedido + Plataforma ────────────────────────────
    // Estratégia: extrair AMBOS xPed (det/prod e compra) e usar o mais completo.
    // Magalu: det/prod/xPed = LU-151657010136 (limpo); compra/xPed = LU-1516570101364829 (com sufixo NF)
    // Amazon: det/prod/xPed = 702-3707962-635 (TRUNCADO!); compra/xPed = 702-3707962-6359413 (completo)
    // Regra: se compra/xPed começa com o valor de det/prod/xPed E é mais longo → só usar compra/xPed
    //        se compra/xPed contém dígitos extras no FINAL que não são padrão Amazon → usar det/prod/xPed
    let nPedido = "";
    const detEls = gAllIn(infNFe, "det");
    let xPedDet = "";
    if (detEls.length > 0) {
      const prodEl = gIn(detEls[0],"prod");
      if (prodEl) {
        const xPedEl = gIn(prodEl,"xPed");
        if (xPedEl) xPedDet = xPedEl.textContent.trim();
      }
    }
    let xPedCompra = "";
    const compraEl = gAllIn(infNFe, "compra")[0] || gAll("compra")[0] || null;
    if(compraEl){
      const xPedC = gIn(compraEl,"xPed");
      if(xPedC) xPedCompra = xPedC.textContent.trim();
    }
    // 3. Escolher o mais correto
    // REGRA DEFINITIVA (confirmada via infCpl dos XMLs reais):
    //   Magalu: compra/xPed = ID COMPLETO (ex: LU-1516570101364829)
    //           det/xPed    = ID TRUNCADO  (ex: LU-151657010136)
    //   Amazon: compra/xPed = ID COMPLETO (ex: 701-2559262-6733828)
    //           det/xPed    = ID TRUNCADO  (ex: 701-2559262-673)
    // → Para ambas as plataformas, compra/xPed é sempre mais completo
    // → Usar compra/xPed sempre que disponível
    if(xPedDet && xPedCompra){
      // compra/xPed é sempre preferível — tem o ID completo da plataforma
      nPedido = xPedCompra;
    } else {
      nPedido = xPedDet || xPedCompra || g("xPed") || g("nFat") || "";
    }
    const idCadIntTran = g("idCadIntTran").toLowerCase();
    let plataforma = identifyMarketplace(g("idCadIntTran"), nPedido);

    // ── BUG2 FIX: robust vFrete extraction ──────────────────────
    // Strategy: ICMSTot/vFrete is the authoritative total freight value
    // Fallback: sum all <vFrete> tags in <det> items
    let vFreteTotal = 0;
    const icmsTot = gAllIn(infNFe, "ICMSTot")[0] || gAll("ICMSTot")[0] || null;
    if(icmsTot){
      const vf = gIn(icmsTot,"vFrete");
      vFreteTotal = parseFloat(vf ? vf.textContent : "0") || 0;
    }
    if(vFreteTotal === 0){
      for(const det of detEls){
        const prodEl = gIn(det,"prod");
        const vf = prodEl ? gIn(prodEl,"vFrete") : gIn(det,"vFrete");
        if(vf) vFreteTotal += parseFloat(vf.textContent || "0") || 0;
      }
    }
    vFreteTotal = Math.round(vFreteTotal * 100) / 100;

    const ideEl = gIn(infNFe, "ide") || gAllIn(infNFe, "ide")[0] || null;
    const totalEl = gIn(infNFe, "total") || gAllIn(infNFe, "total")[0] || null;

    const nNF = (ideEl ? gIn(ideEl,"nNF")?.textContent.trim() : "") || g("nNF") || "00000";
    let chavNfe = g("chNFe");
    if(!chavNfe){
      const infProt = gAll("infProt")[0];
      if(infProt){
        const ch = gIn(infProt,"chNFe");
        if(ch) chavNfe = ch.textContent.trim();
      }
    }
    if(!chavNfe){
      const idAttr = infNFe.getAttribute?.("Id") || doc.querySelector("[Id]")?.getAttribute("Id") || "";
      chavNfe = idAttr.replace(/^NFe/i, "").trim();
    }
    const valor = parseFloat((totalEl ? gIn(totalEl,"vNF")?.textContent : "") || g("vNF")) || 0;

    let volumes = 0;
    let pesoB = 0;
    if(transpRootEl){
      const volEls = gAllIn(transpRootEl, "vol");
      for(const ve of volEls){
        const qve = gIn(ve,"qVol");
        if(qve) volumes += (parseInt(qve.textContent||"0",10)||0);
        const pb = gIn(ve,"pesoB");
        if(pb) pesoB += parseFloat(pb.textContent || "0") || 0;
      }
    }
    if(volumes === 0) volumes = parseInt(g("qVol"),10)||1;
    if(pesoB === 0) pesoB = parseFloat(g("pesoB")) || 0;
    const dhEmi = (ideEl ? gIn(ideEl,"dhEmi")?.textContent.trim() : "") || g("dhEmi");

    // ── Número do pedido (limpar prefix) ──────────────────────
    // nPedido já extraído acima a partir de det/prod/xPed (limpo, sem sufixo)

    return {
      nf: `NF-${nNF}`,
      cliente: destNode ? (gIn(destNode,"xNome")?.textContent.trim()||"Destinatario") : "Destinatario",
      cidade,
      uf,
      transportadora,
      plataforma,
      numeroPedido: nPedido,
      valor,
      custoFrete: vFreteTotal,
      volumes,
      peso: pesoB,
      chavNfe,
      dhEmi,
      cpfCliente: cpfCnpjDest,
      cepCliente: cepDest,
      _transpNomeRaw: transpNome,
      _idCadIntTran: g("idCadIntTran"),
    };
  }catch(e){
    console.error("parseNFe error:", e);
    return null;
  }
}

        custoExtra:     0,
        volumes:        r.volumes || 1,
        peso:           r.peso    || 0,
        reenvio:        "NAO",
        rotaEntrega:    "",
        clienteAvisado: "",
        dataContato:    nowStr(),  // data de entrada no sistema (DD/MM/YYYY HH:MM)
        responsavel:    "",
        statusFinal:    "",
        previsaoPlataforma: "",
        previsaoEntrega:    "",
        nfOriginal:         "",
        nfReenvioVinculada: "",
        dataEntregaReal:    "",
        diasEntregaReal:    null,
        risco:          "sem_risco",
        dataEnvio:      envio.toISOString(),
        status:         "em_transito",
        observacoes:    [],
        chamados:       [],

          data: nowStr(),

        }]
      };
      calcOrder(o);
      S.orders.unshift(o);
    });

    // Existing orders — complement only missing fields
    toUpdate.forEach(({result: r, existing: ex}) => {
      const changes = [];
      if (!ex.chavNfe       && r.chavNfe)       { ex.chavNfe       = r.chavNfe;       changes.push("chave NF-e"); }
      if (!ex.cpfCliente    && r.cpfCliente)    { ex.cpfCliente    = r.cpfCliente;    changes.push("CPF"); }
      if (!ex.cepCliente    && r.cepCliente)    { ex.cepCliente    = r.cepCliente;    changes.push("CEP"); }
      if (!ex.cidade        && r.cidade)         { ex.cidade        = r.cidade;        changes.push("cidade"); }
      if (!ex.uf            && r.uf)             { ex.uf            = r.uf;            changes.push("UF"); }
      if ((!ex.valor        || ex.valor === 0)   && r.valor)        { ex.valor        = r.valor;        changes.push("valor NF"); }
      if ((!ex.custoFrete   || ex.custoFrete===0) && r.custoFrete)  { ex.custoFrete   = r.custoFrete;   changes.push("frete R$" + r.custoFrete.toFixed(2)); }
      if (!ex.plataforma    && r.plataforma)     { ex.plataforma    = r.plataforma;    changes.push("plataforma"); }
      if (!ex.transportadora && r.transportadora){ ex.transportadora= r.transportadora;changes.push("transportadora"); }
      if (!ex.numeroPedido  && r.numeroPedido)   { ex.numeroPedido  = r.numeroPedido;  changes.push("n.pedido"); }
      if (!ex.volumes       && r.volumes)        { ex.volumes       = r.volumes; }
      if (!ex.peso          && r.peso)           { ex.peso          = r.peso; }
      const acao = changes.length
        ? `Complementado via XML: ${changes.join(", ")}`
        : "XML reimportado — sem novos dados para complementar";
      ex.historico = [{data: nowStr(), usuario: SESSION ? SESSION.name || "XML" : "XML", acao}, ...(ex.historico || [])];
    });

    saveOrders(); renderAll();
    document.getElementById("xmlModal").style.display = "none";
    showToast(`${toImport.length} importado(s), ${toUpdate.length} atualizado(s)`, "success");
  document.getElementById("btnCancelXml")?.style&&(document.getElementById("btnCancelXml").style.display="none");
  }, {once:true});

  zone.addEventListener("drop",e=>{e.preventDefault();zone.classList.remove("drag-over");processBackupFiles(e.dataTransfer.files);});
  document.getElementById("backupFileIn").addEventListener("change",e=>processBackupFiles(e.target.files));
  document.getElementById("btnManualBackup")?.addEventListener("click",async()=>{if(window.pywebview){const r=await window.pywebview.api.manual_backup();if(r.ok){showToast(`Backup salvo! Total: ${r.count}`,"success");openBackupModal();}}else{try{LS.setItem("logsystem_v5_backup_"+Date.now(),JSON.stringify(S.orders));showToast("Backup local salvo","success");}catch(e){showToast("Erro no backup","error");}}});
}
async function processBackupFiles(files){
  if(_backupProcessing||!files||!files.length)return;
  _backupProcessing=true;
  const resultEl=document.getElementById("backupDropResult");
  const f=files[0];
  if(!f.name.toLowerCase().endsWith(".json")){
    if(resultEl)resultEl.innerHTML=`<div class="alert alert-error">Selecione um arquivo .json de backup.</div>`;
    _backupProcessing=false;return;
  }
  if(resultEl)resultEl.innerHTML=`<div style="color:var(--sub);font-size:12px;">Processando ${esc(f.name)}...</div>`;
  try{
    const content=await f.text();
    if(!window.pywebview){
      const raw=JSON.parse(content);
      const orders=Array.isArray(raw)?raw:(raw.orders||[]);
      if(!orders.length){showToast("Backup vazio ou invalido","error");return;}
      if(!confirm(`Restaurar ${orders.length} pedido(s) do arquivo?\nDados existentes serao mesclados.`))return;
      S.orders=[...S.orders,...orders];saveOrders();renderAll();
      document.getElementById("backupModal").style.display="none";
      showToast(`${orders.length} pedido(s) importado(s) do backup`,"success");
      return;
    }
    if(!confirm("Restaurar este backup?\nPedidos existentes sao mantidos — chamados e historico ausentes serao recuperados."))return;
    const r=await window.pywebview.api.restore_backup_content(content);
    if(r.ok){
      await loadLists();await loadOrders();renderAll();
      document.getElementById("backupModal").style.display="none";
      showToast(r.msg||"Backup restaurado","success");
    }else showToast(r.msg||"Erro ao restaurar","error");
  }catch(e){
    if(resultEl)resultEl.innerHTML=`<div class="alert alert-error">Arquivo invalido: ${esc(String(e))}</div>`;
    else showToast("Arquivo de backup invalido","error");
  }
  _backupProcessing=false;
}
window.restoreBackup=async(name)=>{if(!confirm("Restaurar este backup?\nPedidos existentes sao mantidos — chamados e historico ausentes serao recuperados."))return;if(window.pywebview){const r=await window.pywebview.api.restore_backup(name);if(r.ok){await loadLists();await loadOrders();renderAll();document.getElementById("backupModal").style.display="none";const msg=r.msg||`${r.added||0} pedido(s) restaurado(s)`;showToast(msg,"success");}else showToast(r.msg,"error");}};

function orderScore(o) {
  // Pontuação de completude — dedup mantém o pedido com maior score (mais dados)
  let s = 0;
  if ((o.chamados||[]).length > 0)    s += 100 + (o.chamados.length * 10);
  if ((o.historico||[]).length > 1)   s += (o.historico.length * 5);
  if ((o.observacoes||[]).length > 0) s += 20;
  if (o.rastreio && o.rastreio.trim()) s += 30;
  if (o.dataEntregaReal)              s += 20;
  if (o.previsaoEntrega)              s += 10;
  if (o.cidade)                       s += 5;
  if (o.chavNfe && o.chavNfe.length===44) s += 15;
  return s;
}

function deduplicateOrders() {
  // Agrupa por número de NF normalizado (chave principal)
  // Dois pedidos são duplicatas se têm o MESMO número de NF,
  // independente de um ter chavNfe e o outro não
  const normNF = o => String(o.nf||"").replace(/^NF-?/i,"").trim().toLowerCase();
  const validNF = nf => nf && nf !== "null" && nf !== "undefined" && nf !== "0" && nf !== "";

  const byNF = new Map();
  S.orders.forEach((o, i) => {
    const nf = normNF(o);
    if (!validNF(nf)) return;
    if (!byNF.has(nf)) byNF.set(nf, []);
    byNF.get(nf).push(i);
  });

  // Segunda passagem: agrupar também por chavNfe (caso NFs diferentes mas mesma chave)
  const byChave = new Map();
  S.orders.forEach((o, i) => {
    const chave = (o.chavNfe||"").trim();
    if (chave.length !== 44) return; // só chaves completas de 44 dígitos
    if (!byChave.has(chave)) byChave.set(chave, []);
    byChave.get(chave).push(i);
  });

  // Unir grupos: se dois pedidos compartilham chavNfe, mesclar nos grupos de NF
  byChave.forEach((indices, chave) => {
    if (indices.length < 2) return;
    // Pegar a NF do mais completo e garantir que todos estejam no mesmo grupo
    const nfs = [...new Set(indices.map(i => normNF(S.orders[i])).filter(validNF))];
    if (nfs.length === 1) return; // já estão no mesmo grupo de NF
    // NFs diferentes mas mesma chavNfe → duplicatas! Juntar tudo no grupo da primeira NF
    const mainNF = nfs[0];
    if (!byNF.has(mainNF)) byNF.set(mainNF, []);
    const existing = new Set(byNF.get(mainNF));
    indices.forEach(i => { if (!existing.has(i)) { byNF.get(mainNF).push(i); existing.add(i); } });
  });

  const dupes = [];
  byNF.forEach(indices => {
    if (indices.length < 2) return;
    // Manter o mais completo (maior score), remover os outros
    const sorted = [...indices].sort((a,b) => orderScore(S.orders[b]) - orderScore(S.orders[a]));
    sorted.slice(1).forEach(i => dupes.push(i));
  });
  return [...new Set(dupes)].sort((a,b) => a - b);
}

      <button class="btn btn-danger btn-md" id="btnConfirmDedup">Remover ${dupes.length} Duplicata(s)</button>
    </div>
  </div>`;
  document.getElementById("btnConfirmDedup").addEventListener("click", () => {
    // Usa os MESMOS índices calculados por deduplicateOrders() — consistente com o que foi exibido
    // e garante que o pedido MAIS COMPLETO (maior score) é mantido, não só o primeiro
    const dupeSet = new Set(dupes);
    const before = S.orders.length;

function findExistingByNf(nf, chavNfe) {
  const normNF = s => String(s||"").replace(/^NF-?/i,"").trim().toLowerCase();
  const n1 = normNF(nf);
  for (const o of S.orders) {
    if (chavNfe && o.chavNfe && o.chavNfe.trim() === chavNfe.trim()) return o;

  }
  return null;
}

      "responsavel","rotaEntrega","previsaoEntrega","previsaoPlataforma",
      "custoReenvio","custoExtra","nfOriginal","nfReenvioVinculada","statusFinal"];

    function mergeComExistente(novo, existente) {
      // Para pedido já existente: planilha só preenche campos que estão vazios
      const merged = {...existente};
      CAMPOS_PROTEGIDOS.forEach(k => {
        const existeVal = existente[k];
        const vazio = existeVal === undefined || existeVal === null || existeVal === ""
          || (Array.isArray(existeVal) && existeVal.length === 0);
        if (!vazio) return; // já tem dado → não sobrescreve
        if (novo[k] !== undefined && novo[k] !== null && novo[k] !== "")
          merged[k] = novo[k];
      });
      // Campos que a planilha PODE atualizar (status, transportadora, etc.) — só se existente estiver vazio
      ["transportadora","plataforma","numeroPedido","cidade","uf","chavNfe","valor","custoFrete"].forEach(k => {
        if (!existente[k] && novo[k]) merged[k] = novo[k];
      });
      return calcOrder(merged);
    }

    document.getElementById("choiceReplace").onclick = () => {
      const normNF = s => String(s||"").replace(/^NF-?/i,"").trim().toLowerCase();
      // Índice dos pedidos que vieram da planilha (r.orders)
      const rNFset = new Set(r.orders.map(o => normNF(o.nf)));
      const rChaveSet = new Set(r.orders.map(o => (o.chavNfe||"").trim()).filter(v=>v.length===44));
      // Pedidos em S.orders que NÃO estão na planilha (ex: adicionados via XML manual)
      const somenteEmMemoria = S.orders.filter(o => {
        if (rChaveSet.has((o.chavNfe||"").trim())) return false;
        if (rNFset.has(normNF(o.nf))) return false;
        return true;
      });
      // Merge: planilha com dados da memória
      const existByNF = {};
      S.orders.forEach(o => { existByNF[normNF(o.nf)] = o; });
      const fromPlanilha = r.orders.map(novo => {
        const existente = existByNF[normNF(novo.nf)];
        return existente ? mergeComExistente(novo, existente) : calcOrder(novo);
      });
      // Resultado final: planilha + pedidos que só existem em memória (XML, manuais)
      S.orders = [...fromPlanilha, ...somenteEmMemoria];
      S.orders.forEach(o => {
        if (o.plataforma && !PLATAFORMAS.includes(o.plataforma)) PLATAFORMAS.push(o.plataforma);
        if (o.transportadora && !TRANSPORTADORAS.includes(o.transportadora)) TRANSPORTADORAS.push(o.transportadora);
      });
      saveLists(); saveOrders(); renderAll();
      el.style.display = "none";
      const extra = somenteEmMemoria.length > 0 ? ` + ${somenteEmMemoria.length} pedido(s) manual/XML preservado(s)` : "";
      showToast(`Planilha carregada${extra}`, "success");
    };
    document.getElementById("choiceMerge").onclick = () => {
      const existByNF = {};
      S.orders.forEach(o => { existByNF[String(o.nf||"").replace(/^NF-?/i,"").trim().toLowerCase()] = o; });
      let atualizados = 0, novos = 0;
      r.orders.forEach(novo => {
        const key = String(novo.nf||"").replace(/^NF-?/i,"").trim().toLowerCase();
        const existente = existByNF[key];
        if (existente) {
          // Já existe — só preenche campos vazios no existente
          CAMPOS_PROTEGIDOS.forEach(k => {
            const existeVal = existente[k];
            const vazio = existeVal === undefined || existeVal === null || existeVal === ""
              || (Array.isArray(existeVal) && existeVal.length === 0);
            if (!vazio) return;
            if (novo[k] !== undefined && novo[k] !== null && novo[k] !== "") existente[k] = novo[k];
          });
          calcOrder(existente);
          atualizados++;
        } else {
          S.orders.push(calcOrder(novo));
          novos++;
        }
        if (novo.plataforma && !PLATAFORMAS.includes(novo.plataforma)) PLATAFORMAS.push(novo.plataforma);
        if (novo.transportadora && !TRANSPORTADORAS.includes(novo.transportadora)) TRANSPORTADORAS.push(novo.transportadora);
      });
      saveLists(); saveOrders(); renderAll();
      el.style.display = "none";
      showToast(`${novos} novos adicionados, ${atualizados} complementados`, "success");
    };
  } catch(e) { showToast(String(e),"error"); }
}

// Calcula SLA detalhado para um array de pedidos
function calcSLADetail(orders){
  let ok=0, fail=0;
  const failing=[]; // pedidos que impactam negativamente
  const today=new Date(); today.setHours(0,0,0,0);

  orders.forEach(o=>{
    if(o.status==="extraviado"||o.status==="retorno") return;
    const delivered=["entregue_prazo","entregue_atraso","reenvio_prazo","reenvio_atraso"].includes(o.status);
    const dl=effectiveDeadline(o);
    let isOk=false, isFail=false;

    if(delivered){
      if(o.dataEntregaReal && dl){
        if(new Date(o.dataEntregaReal)<=new Date(dl)) isOk=true;
        else isFail=true;
      } else if(o.status==="entregue_prazo"||o.status==="reenvio_prazo") isOk=true;
      else isFail=true;
    } else {
      if(dl && new Date(dl)<today) isFail=true;
    }

    if(isOk) ok++;
    if(isFail){
      fail++;
      const overdueDays = dl ? Math.round((today - new Date(dl))/(1000*60*60*24)) : null;
      const deliveredDays = (o.dataEntregaReal&&dl)
        ? Math.round((new Date(o.dataEntregaReal)-new Date(dl))/(1000*60*60*24))
        : null;
      failing.push({
        nf: o.nf,
        cliente: o.cliente,
        transportadora: o.transportadora||"N/A",
        plataforma: o.plataforma||"",
        status: o.status,
        dl: dl,
        dataEntregaReal: o.dataEntregaReal||"",
        overdueDays: delivered ? deliveredDays : overdueDays,
        isDelivered: delivered,
        risco: o.risco,
        id: o.id,
      });
    }
  });

  const total=ok+fail;
  // TTS breakdown: pedidos entregues com tempo de trânsito alto (>7d)
  const highTTS = [];
  orders.forEach(o=>{
    if(o.dataEntregaReal && o.dataEnvio){
      const dias = diffDays(o.dataEnvio, o.dataEntregaReal);
      if(dias > 7){
        highTTS.push({
          nf:o.nf, cliente:o.cliente, transportadora:o.transportadora,
          dias, status:o.status, id:o.id, plataforma:o.plataforma
        });
      }
    }
  });
  highTTS.sort((a,b)=>b.dias-a.dias);
  return {ok,fail,total,sla:total?Math.round(ok/total*100):100,failing,highTTS};
}

// Agrupa pedidos por mês/ano
function ordersByMonth(){
  const map={};
  S.orders.forEach(o=>{
    if(!o.dataEnvio) return;
    const d=new Date(o.dataEnvio);
    if(isNaN(d)) return;
    const key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    if(!map[key]) map[key]={orders:[],label:""};
    map[key].orders.push(o);
    const mm=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
    map[key].label=mm[d.getMonth()]+"/"+d.getFullYear();
  });
  return map;
}

            <th style="text-align:right;padding:5px 8px;color:var(--amber);font-size:10px;">Dias Trânsito</th>

      <!-- Pedidos que afetam negativamente o SLA -->

}

function renderSLAFailRows(failing, filterText){
  if(!failing.length) return `<div style="padding:16px;text-align:center;color:var(--muted);font-size:12px;">Nenhuma falha no período — SLA impecável! 🎉</div>`;

  const ft=(filterText||"").toLowerCase();
  const transF=S._slaTransFilter||"";
  let rows=failing.filter(r=>{
    if(transF && r.transportadora!==transF) return false;
    if(!ft) return true;
    return r.nf.toLowerCase().includes(ft)||r.transportadora.toLowerCase().includes(ft)||r.cliente.toLowerCase().includes(ft);
  });

  if(!rows.length) return `<div style="padding:12px;color:var(--muted);font-size:11px;">Nenhum resultado para o filtro.</div>`;

  const slaColor=v=>v>=90?"var(--green)":v>=70?"var(--amber)":"var(--red)";
  return `
  <div style="font-size:10px;color:var(--muted);margin-bottom:6px;">${rows.length} pedido(s)${transF?` — transportadora: <strong style="color:var(--text);">${esc(transF)}</strong> <button class="btn btn-ghost btn-xs" onclick="S._slaTransFilter='';renderSLAFailList();">✕</button>`:""}</div>
  <div style="overflow-x:auto;">
  <table style="width:100%;border-collapse:collapse;font-size:11px;">
    <tr style="border-bottom:1px solid var(--border2);">
      <th style="text-align:left;padding:5px 8px;color:var(--sub);font-weight:600;font-size:10px;">NF</th>
      <th style="text-align:left;padding:5px 8px;color:var(--sub);font-weight:600;font-size:10px;">Cliente</th>
      <th style="text-align:left;padding:5px 8px;color:var(--sub);font-weight:600;font-size:10px;">Transportadora</th>
      <th style="text-align:left;padding:5px 8px;color:var(--sub);font-weight:600;font-size:10px;">Status</th>
      <th style="text-align:right;padding:5px 8px;color:var(--sub);font-weight:600;font-size:10px;">Prazo</th>
      <th style="text-align:right;padding:5px 8px;color:var(--sub);font-weight:600;font-size:10px;">Entrega Real</th>
      <th style="text-align:right;padding:5px 8px;color:var(--red);font-weight:600;font-size:10px;">Atraso</th>
      <th style="padding:5px 8px;"></th>
    </tr>
    ${rows.map(r=>{
      const st=STATUS[r.status]||{label:r.status,dot:"#94A3B8"};
      const days=r.overdueDays;
      const daysStr=days!=null?(days>0?"+"+days+"d":days+"d"):"em aberto";
      return `<tr style="border-bottom:1px solid var(--border);cursor:pointer;" onclick="openOrder('${r.id}')">
        <td style="padding:6px 8px;font-family:var(--font-mono);font-size:10px;color:var(--sky);">${esc(r.nf)}</td>
        <td style="padding:6px 8px;color:var(--text);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(r.cliente)}</td>
        <td style="padding:6px 8px;color:var(--sub);">${esc(r.transportadora)}</td>
        <td style="padding:6px 8px;"><span style="background:${st.bg||"transparent"};color:${st.dot};padding:2px 6px;border-radius:4px;font-size:9px;font-weight:700;">${st.label}</span></td>
        <td style="padding:6px 8px;text-align:right;color:var(--muted);font-size:10px;">${r.dl?fmtDate(r.dl):"—"}</td>
        <td style="padding:6px 8px;text-align:right;color:var(--sub);font-size:10px;">${r.dataEntregaReal?fmtDate(r.dataEntregaReal):"—"}</td>
        <td style="padding:6px 8px;text-align:right;font-family:var(--font-mono);font-weight:700;color:var(--red);">${daysStr}</td>
        <td style="padding:6px 8px;"><button class="btn btn-ghost btn-xs" onclick="event.stopPropagation();openOrder('${r.id}')">Ver</button></td>
      </tr>`;
    }).join("")}
  </table></div>`;
}

function renderSLAFailList(){
  const ft=document.getElementById("slaFilterInput")?.value||"";
  const selMonth=S._slaMonth||"all";
  const byMonth=ordersByMonth();
  const baseOrders=selMonth==="all"?S.orders:(byMonth[selMonth]?.orders||[]);
  const detail=calcSLADetail(baseOrders);
  const el=document.getElementById("slaFailTable");
  if(el) el.innerHTML=renderSLAFailRows(detail.failing, ft);
}

function bindSLAView(){
  document.getElementById("slaFilterInput")?.addEventListener("input",renderSLAFailList);
}

function renderChamados() {
  const cc = chamadoCounts(), tf = S.ticketFilter;
  const all = [];
  S.orders.forEach(o => (o.chamados||[]).forEach(c => all.push({...c, _orderId: o.id, _orderNf: o.nf, _orderCliente: o.cliente})));
  const filtered = tf ? all.filter(c => c.status === tf) : all;
  filtered.sort((a,b) => {
    const priority = {aberto: 0, "em andamento": 1, resolvido: 2};
    return (priority[a.status]||0) - (priority[b.status]||0);
  });

  return `
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px;">
      ${Object.entries(STATUS_CHAMADO).map(([k,v])=>`<div style="background:${v.bg};border:1.5px solid ${tf===k?v.text:"var(--border)"};border-radius:10px;padding:14px 16px;cursor:pointer;" onclick="setTicketFilter('${k}')">
        <div style="font-size:28px;font-weight:800;font-family:var(--font-mono);color:${v.text};">${cc[k]||0}</div>
        <div style="font-size:11px;font-weight:700;margin-top:4px;text-transform:capitalize;color:${v.text};">${k}</div>
      </div>`).join("")}
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <div class="sec-label" style="margin:0;">${filtered.length} chamado(s) ${tf||"total"}</div>
      <button class="btn btn-secondary btn-sm" id="btnExportChamados">Exportar Relatorio (.xlsx)</button>
    </div>
    <div id="chamadosList">
      ${filtered.length === 0 ? `<div class="card"><div class="empty-state">Nenhum chamado encontrado.</div></div>` : ""}
      ${filtered.map(c => renderChamadoCard(c)).join("")}
    </div>`;
}

function renderChamadoCard(c) {
  const tarefas = c.tarefas || [];
  const comentarios = c.comentarios || [];
  const done = tarefas.filter(t=>t.done).length;
  const sc = STATUS_CHAMADO[c.status] || STATUS_CHAMADO.aberto;

  return `<div class="chamado-card" id="chamado_${c.id}">
    <div class="chamado-card-header">
      <div style="flex:1;">
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:5px;">
          <div class="chamado-card-title">${esc(c.titulo)}</div>
          ${badgeChamado(c.status)}
          ${c.responsavel ? `<span style="font-size:10px;color:var(--sub);">👤 ${esc(c.responsavel)}</span>` : ""}
        </div>
        <div style="font-size:10px;color:var(--muted);">
          <span class="nf-mono">${esc(c._orderNf||"")}</span> — ${esc(c._orderCliente||"")} 
          ${c.data ? ` | Aberto: ${esc(c.data)}` : ""}
          ${c.dataConclusao ? ` | Concluido: ${esc(c.dataConclusao)}` : ""}
          ${tarefas.length ? ` | Tarefas: ${done}/${tarefas.length}` : ""}
        </div>
      </div>
      <div style="display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end;">
        <button class="btn btn-ghost btn-xs" onclick="openChamadoEdit('${c._orderId}',${c.id})">Editar</button>
        <button class="btn btn-ghost btn-xs" onclick="openOrder('${c._orderId}')">Ver Pedido</button>
      </div>
    </div>
    ${c.descricao ? `<div style="font-size:12px;color:var(--sub);margin-bottom:10px;padding:8px 10px;background:var(--panel);border-radius:6px;">${esc(c.descricao)}</div>` : ""}
    ${tarefas.length > 0 ? `
      <div style="margin-bottom:10px;">
        <div class="sec-label" style="margin-bottom:6px;">Tarefas</div>
        ${tarefas.map((t,ti) => `<div class="chamado-task">
          <input type="checkbox" ${t.done?"checked":""} onchange="toggleTask('${c._orderId}',${c.id},${ti},this.checked)"/>
          <span class="chamado-task-text ${t.done?"chamado-task-done":""}">${esc(t.texto)}</span>
          <span style="font-size:9px;color:var(--muted);">${t.done?`Concluido: ${t.doneDate||""}`:""}</span>
        </div>`).join("")}
      </div>` : ""}
    ${comentarios.length > 0 ? `
      <div>
        <div class="sec-label" style="margin-bottom:6px;">Comentarios (${comentarios.length})</div>
        ${comentarios.slice(-3).map(cm => `<div class="chamado-comment">
          <div class="chamado-comment-user">${esc(cm.usuario||"")}</div>
          <div class="chamado-comment-text">${esc(cm.texto)}</div>
          <div class="chamado-comment-date">${esc(cm.data||"")}</div>
        </div>`).join("")}
        ${comentarios.length > 3 ? `<div style="font-size:10px;color:var(--muted);">${comentarios.length-3} comentario(s) anteriores ocultos — edite para ver todos</div>` : ""}
      </div>` : ""}
    <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:flex;gap:6px;align-items:center;">
      <input id="quickComment_${c.id}" placeholder="Comentario rapido..." style="flex:1;padding:6px 10px;background:var(--panel);border:1px solid var(--border2);border-radius:6px;font-size:11px;color:var(--text);outline:none;font-family:inherit;" onkeydown="if(event.key==='Enter')addQuickComment('${c._orderId}',${c.id})"/>
      <button class="btn btn-ghost btn-xs" onclick="addQuickComment('${c._orderId}',${c.id})">Enviar</button>
      <div style="margin-left:auto;display:flex;gap:4px;">
        ${["aberto","em andamento","resolvido"].map(s=>`<button class="btn btn-xs ${c.status===s?"btn-primary":"btn-secondary"}" onclick="updateChamadoStatus('${c._orderId}',${c.id},'${s}')">${s}</button>`).join("")}
      </div>
    </div>
  </div>`;
}

window.addQuickComment = (orderId, chamadoId) => {
  const inp = document.getElementById(`quickComment_${chamadoId}`);
  const txt = inp?.value?.trim();
  if (!txt) return;
  const o = S.orders.find(x => x.id === orderId);
  if (!o) return;
  const ch = (o.chamados||[]).find(c => c.id === chamadoId);
  if (!ch) return;
  if (!ch.comentarios) ch.comentarios = [];
  ch.comentarios.push({id: Date.now(), texto: txt, usuario: SESSION.name || "Operador", data: nowStr()});
  if (!ch.historico) ch.historico = [];
  ch.historico.push({data: nowStr(), usuario: SESSION.name || "Operador", acao: `Comentario adicionado`});
  inp.value = "";
  saveOrders(); renderContent(); renderSidebar();
};

window.toggleTask = (orderId, chamadoId, taskIdx, done) => {
  const o = S.orders.find(x => x.id === orderId);
  if (!o) return;
  const ch = (o.chamados||[]).find(c => c.id === chamadoId);
  if (!ch || !ch.tarefas || !ch.tarefas[taskIdx]) return;
  ch.tarefas[taskIdx].done = done;
  ch.tarefas[taskIdx].doneDate = done ? nowStr() : "";
  if (!ch.historico) ch.historico = [];
  ch.historico.push({data: nowStr(), usuario: SESSION.name || "Operador", acao: `Tarefa "${ch.tarefas[taskIdx].texto.slice(0,30)}..." ${done?"concluida":"reaberta"}`});
  // Auto-conclude chamado if all tasks done
  if (done && ch.tarefas.every(t => t.done) && ch.status !== "resolvido") {
    ch.status = "resolvido";
    ch.dataConclusao = nowStr();
    ch.historico.push({data: nowStr(), usuario: SESSION.name || "Operador", acao: "Todas as tarefas concluidas — chamado marcado como resolvido automaticamente"});
  }
  saveOrders(); renderContent(); renderSidebar();
};

window.openChamadoEdit = (orderId, chamadoId) => {
  const o = S.orders.find(x => x.id === orderId);
  if (!o) return;
  const ch = (o.chamados||[]).find(c => c.id === chamadoId);
  if (!ch) return;
  let el = document.getElementById("chamadoEditModal");
  if (!el) { el = document.createElement("div"); el.id = "chamadoEditModal"; el.className = "overlay"; document.body.appendChild(el); }
  el.style.display = "flex";
  el.innerHTML = `<div class="modal modal-xl">
    <div class="modal-header">
      <h2>Chamado — ${esc(ch.titulo)}</h2>
      <button class="modal-close" onclick="document.getElementById('chamadoEditModal').style.display='none'">x</button>
    </div>
    <div class="modal-body">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px;">
        <div class="field"><label>Titulo *</label><input id="ceTitle" value="${esc(ch.titulo)}"/></div>
        <div class="field"><label>Responsavel</label><input id="ceResp" value="${esc(ch.responsavel||"")}" placeholder="Nome do responsavel"/></div>
        <div class="field"><label>Status</label><select id="ceStatus">
          ${["aberto","em andamento","resolvido"].map(s=>`<option value="${s}" ${ch.status===s?"selected":""}>${s}</option>`).join("")}
        </select></div>
      </div>
      <div class="field" style="margin-bottom:14px;"><label>Descricao</label><textarea id="ceDesc" rows="3">${esc(ch.descricao||"")}</textarea></div>
      <div class="field" style="margin-bottom:14px;"><label>Conclusao / Resolucao</label><textarea id="ceConclusao" rows="2" placeholder="Descreva como foi resolvido...">${esc(ch.conclusao||"")}</textarea></div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
        <div>
          <div class="sec-label">Tarefas</div>
          <div style="display:flex;gap:6px;margin-bottom:8px;">
            <input id="ceNewTask" placeholder="Nova tarefa..." style="flex:1;padding:6px 10px;background:var(--panel);border:1px solid var(--border2);border-radius:6px;font-size:12px;color:var(--text);outline:none;font-family:inherit;"/>
            <button class="btn btn-primary btn-xs" id="ceBtnAddTask">+</button>
          </div>
          <div id="ceTaskList">
            ${(ch.tarefas||[]).map((t,i)=>`<div class="chamado-task">
              <input type="checkbox" ${t.done?"checked":""} onchange="ch_tarefas_temp[${i}].done=this.checked;ch_tarefas_temp[${i}].doneDate=this.checked?'${nowStr()}':''"/>
              <span class="${t.done?"chamado-task-done":""}" style="flex:1;font-size:12px;">${esc(t.texto)}</span>
              <button class="btn btn-ghost btn-xs" onclick="ch_tarefas_temp.splice(${i},1);document.getElementById('ceTaskList').innerHTML=renderCeTaskList()">x</button>
            </div>`).join("") || `<div style="color:var(--muted);font-size:12px;">Nenhuma tarefa.</div>`}
          </div>
        </div>
        <div>
          <div class="sec-label">Comentarios</div>
          <div style="max-height:200px;overflow-y:auto;margin-bottom:8px;">
            ${(ch.comentarios||[]).map((cm,ci)=>`<div class="chamado-comment" style="position:relative;">
              <div class="chamado-comment-user">${esc(cm.usuario||"")}</div>
              <div class="chamado-comment-text" id="ceComText_${ci}">${esc(cm.texto)}</div>
              <textarea id="ceComEdit_${ci}" style="display:none;width:100%;min-height:50px;font-size:11px;margin-top:3px;resize:none;" onkeydown="if(event.ctrlKey&&event.key==='Enter')ceComSave(${ci})"></textarea>
              <div class="chamado-comment-date" style="display:flex;align-items:center;justify-content:space-between;">
                <span>${esc(cm.data||"")}</span>
                <span style="display:flex;gap:3px;">
                  <button class="btn btn-ghost btn-xs" style="font-size:9px;padding:1px 5px;" onclick="ceComEdit(${ci})">✎</button>
                  <button class="btn btn-ghost btn-xs" id="ceComSaveBtn_${ci}" style="display:none;font-size:9px;padding:1px 5px;color:var(--green);" onclick="ceComSave(${ci})">OK</button>
                  <button class="btn btn-danger btn-xs" style="font-size:9px;padding:1px 5px;" onclick="ceComDel(${ci})">✕</button>
                </span>
              </div>
            </div>`).join("") || `<div style="color:var(--muted);font-size:12px;">Sem comentarios.</div>`}
          </div>
          <div style="display:flex;gap:6px;">
            <input id="ceNewComment" placeholder="Novo comentario..." style="flex:1;padding:6px 10px;background:var(--panel);border:1px solid var(--border2);border-radius:6px;font-size:12px;color:var(--text);outline:none;font-family:inherit;"/>
            <button class="btn btn-primary btn-xs" id="ceBtnAddComment">+</button>
          </div>
        </div>
      </div>

      <div style="margin-top:14px;">
        <div class="sec-label">Historico de Alteracoes</div>
        <div style="max-height:120px;overflow-y:auto;">
          ${(ch.historico||[]).slice(0,10).map(h=>`<div class="hist-row"><div class="hist-dot"></div><div class="hist-body"><div class="hist-action">${esc(h.acao)}</div><div class="hist-meta">${esc(h.usuario||"")} — ${esc(h.data||"")}</div></div></div>`).join("") || `<div style="color:var(--muted);font-size:11px;">Sem historico.</div>`}
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary btn-md" onclick="document.getElementById('chamadoEditModal').style.display='none'">Cancelar</button>
      <button class="btn btn-primary btn-md" id="ceBtnSave">Salvar Chamado</button>
    </div>
  </div>`;

  // Temp tarefas for editing
  window.ch_tarefas_temp = JSON.parse(JSON.stringify(ch.tarefas || []));
  window.renderCeTaskList = () => window.ch_tarefas_temp.map((t,i)=>`<div class="chamado-task">
    <input type="checkbox" ${t.done?"checked":""} onchange="ch_tarefas_temp[${i}].done=this.checked"/>
    <span class="${t.done?"chamado-task-done":""}" style="flex:1;font-size:12px;">${esc(t.texto)}</span>
    <button class="btn btn-ghost btn-xs" onclick="ch_tarefas_temp.splice(${i},1);document.getElementById('ceTaskList').innerHTML=renderCeTaskList()">x</button>
  </div>`).join("") || `<div style="color:var(--muted);font-size:12px;">Nenhuma tarefa.</div>`;

  // Comment edit/delete helpers (scoped to this chamado edit)
  window.ceComEdit = (ci) => {
    const txt = document.getElementById(`ceComText_${ci}`);
    const ta  = document.getElementById(`ceComEdit_${ci}`);
    const sb  = document.getElementById(`ceComSaveBtn_${ci}`);
    if(!txt||!ta) return;
    ta.value = txt.textContent;
    txt.style.display = "none"; ta.style.display = ""; if(sb) sb.style.display = "";
    ta.focus();
  };
  window.ceComSave = (ci) => {
    const ta = document.getElementById(`ceComEdit_${ci}`);
    if(!ta) return;
    const newTxt = ta.value.trim();
    if(!newTxt) return;
    if(ch.comentarios && ch.comentarios[ci]) {
      ch.comentarios[ci].texto = newTxt;
      ch.comentarios[ci].editado = nowStr();
    }
    // Re-render comment area
    const txt = document.getElementById(`ceComText_${ci}`);
    const sb  = document.getElementById(`ceComSaveBtn_${ci}`);
    if(txt) { txt.textContent = newTxt; txt.style.display = ""; }
    ta.style.display = "none"; if(sb) sb.style.display = "none";
  };
  window.ceComDel = (ci) => {
    if(!confirm("Remover este comentário?")) return;
    if(ch.comentarios) ch.comentarios.splice(ci, 1);
    // Re-render full modal
    document.getElementById("chamadoEditModal").style.display = "none";
    window.openChamadoEdit(orderId, chamadoId);
  };

  document.getElementById("ceBtnAddTask").addEventListener("click", () => {
    const t = document.getElementById("ceNewTask").value.trim();
    if (!t) return;
    window.ch_tarefas_temp.push({id: Date.now(), texto: t, done: false, doneDate: ""});
    document.getElementById("ceNewTask").value = "";
    document.getElementById("ceTaskList").innerHTML = window.renderCeTaskList();
  });
  document.getElementById("ceNewTask").addEventListener("keydown", e => { if(e.key==="Enter") document.getElementById("ceBtnAddTask").click(); });

  document.getElementById("ceBtnAddComment").addEventListener("click", () => {
    const txt = document.getElementById("ceNewComment").value.trim();
    if (!txt) return;
    if (!ch.comentarios) ch.comentarios = [];
    ch.comentarios.push({id: Date.now(), texto: txt, usuario: SESSION.name||"Operador", data: nowStr()});
    document.getElementById("ceNewComment").value = "";
    const container = document.getElementById("ceNewComment").parentElement.previousElementSibling;
    const newCmt = document.createElement("div");
    newCmt.className = "chamado-comment";
    newCmt.innerHTML = `<div class="chamado-comment-user">${esc(SESSION.name||"")}</div><div class="chamado-comment-text">${esc(txt)}</div><div class="chamado-comment-date">${nowStr()}</div>`;
    container.appendChild(newCmt);
    container.scrollTop = container.scrollHeight;
  });

  document.getElementById("ceBtnSave").addEventListener("click", () => {
    const oldStatus = ch.status;
    ch.titulo = document.getElementById("ceTitle").value.trim() || ch.titulo;
    ch.responsavel = document.getElementById("ceResp").value.trim();
    ch.status = document.getElementById("ceStatus").value;
    ch.descricao = document.getElementById("ceDesc").value.trim();
    ch.conclusao = document.getElementById("ceConclusao").value.trim();
    ch.tarefas = window.ch_tarefas_temp;
    if (!ch.historico) ch.historico = [];
    if (ch.status !== oldStatus) {
      ch.historico.unshift({data: nowStr(), usuario: SESSION.name||"Operador", acao: `Status: ${oldStatus} → ${ch.status}`});
      if (ch.status === "resolvido") ch.dataConclusao = nowStr();
    }
    ch.historico.unshift({data: nowStr(), usuario: SESSION.name||"Operador", acao: "Chamado editado"});
    // Update chamado in S.orders
    const ord = S.orders.find(x => x.id === orderId);
    if (ord) {
      const idx = (ord.chamados||[]).findIndex(x => x.id === chamadoId);
      if (idx >= 0) ord.chamados[idx] = ch;
    }
    saveOrders(); renderContent(); renderSidebar();
    el.style.display = "none";
    showToast("Chamado atualizado", "success");
  });
};

// ================================================================
//  PRAZO LABEL (#13) — show "Aguardando prazo" when empty
// ================================================================
function formatPrazoLabel(isoDate) {
  if (!isoDate || isoDate === "") {
    return `<span style="font-size:10px;color:var(--amber);background:rgba(251,191,36,0.1);padding:2px 6px;border-radius:4px;">Aguardando prazo da transportadora</span>`;
  }
  return fmtDate(isoDate);
}

// ================================================================
//  BIND LOGIN EVENTS
// ================================================================
function bindLogin() {
  const btn = document.getElementById("loginBtn");
  const inp = document.getElementById("loginPassword");
  if (btn) btn.addEventListener("click", doLogin);
  if (inp) inp.addEventListener("keydown", e => { if(e.key === "Enter") doLogin(); });
  const emailInp = document.getElementById("loginEmail");
  if (emailInp) emailInp.addEventListener("keydown", e => { if(e.key === "Enter") { document.getElementById("loginPassword")?.focus(); } });
}

// ================================================================
//  OVERRIDE INIT TO ADD AUTH
// ================================================================
const _origInit = init;
window.init = async function() {
  bindLogin();
  await initAuth();
  // If already authenticated, run original init
  if (SESSION.token) {
    await _origInit();
  }
  // User widget
  document.getElementById("tbUserWidget")?.addEventListener("click", openUserMenu);
  // Chamados export button (bind after render)
  document.addEventListener("click", e => {
    if (e.target && e.target.id === "btnExportChamados") {
      if (window.pywebview) window.pywebview.api.export_chamados_report().then(r => {
        if (r.ok) showToast(`Relatorio exportado: ${r.count} chamados`, "success");
        else showToast(r.msg, "error");
      });
      else showToast("Disponivel no app desktop", "error");
    }
  });
};

document.addEventListener("DOMContentLoaded",init);

</script>
